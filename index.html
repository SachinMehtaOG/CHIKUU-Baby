        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Cutie Chikuu✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Beautiful Background Animation --- */
        .bg-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .heart-particle {
            position: absolute;
            bottom: -10%;
            color: rgba(255, 77, 109, 0.4);
            font-size: 24px;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* --- Card Container --- */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            position: relative;
            animation: fadeIn 1.5s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff4d6d;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            color: #4a4a4a;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Warning Text Layout */
        .warning-text {
            color: #e63946;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: -10px;
            margin-bottom: 15px;
            min-height: 25px;
            display: block;
            transition: all 0.3s ease;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            min-height: 80px;
        }

        .btn {
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff2a55;
        }

        #noBtn {
            background-color: #7a7a7a;
            color: white;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.15);
        }

        /* Success Screen */
        .success-message {
            display: none;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .success-message h2 {
            color: #ff4d6d;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .babu-line {
            font-weight: bold;
            color: #ff2a55;
            font-size: 1.2rem;
            margin-top: 15px;
            background: rgba(255, 77, 109, 0.1);
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <audio id="bgSong" loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div class="bg-hearts" id="heartsBg"></div>

    <div class="container" id="mainContainer">
        <img src="riya.jpg" alt="Someone Special" class="profile-img" id="displayImg">
        
        <div id="questionSection">
            <h1>Hey... ❤️</h1>
            <p id="mainPrompt">Kuch baatein aisi hoti hain jo chat par poori nahi hotin. Tumhare saath waqt bitana, baatein karna mujhe bohot accha lagta hai...</p>
            <p><strong>Will you be mine? ✨</strong></p>
            
            <span class="warning-text" id="warningMessage"></span>
            
            <div class="btn-group">
                <button class="btn" id="yesBtn" onclick="celebrate()">Yes</button>
                <button class="btn" id="noBtn" onclick="handleNoClick()">No</button>
            </div>
        </div>

        <div class="success-message" id="successSection">
            <h2>Yayyy! ❤️✨</h2>
            <p>I knew it! Ab jaldi se Snapchat par aao, aage ki baatein wahan karte hain! 😉 🥂</p>
            <span class="babu-line">Chocolate aur jhumke kon lega? 🥺❤️ 🌸</span>
        </div>
    </div>

    <script>
        let noClickCount = 0;
        let yesButtonScale = 1;

        const responses = [
            "Vapis soch lo... 🥺",
            "Ek baar aur soch lo, galat baat hai ye! 💔",
            "Arey pakka? Galati kar rhi ho tum! 🤔",
            "Nahi matlab... option hi galat select kiya hai tumne! 😂",
            "Maan jao na, please? 💖",
            "Ab to Yes hi dabana padega boss! 😉"
        ];

        // Song play karne ka function
        function playMusic() {
            const audio = document.getElementById('bgSong');
            audio.play().catch(err => console.log("Audio play deferred"));
        }

        function handleNoClick() {
            playMusic(); // Pehle click par music chalu ho jayega
            noClickCount++;
            const warningMessage = document.getElementById('warningMessage');
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');

            if (noClickCount <= responses.length) {
                warningMessage.innerText = responses[noClickCount - 1];
            } else {
                warningMessage.innerText = "Ab bas bhi karo, Yes daba do! 😤❤️";
            }

            yesButtonScale += 0.25;
            yesBtn.style.transform = `scale(${yesButtonScale})`;
            
            if (noClickCount >= 4) {
                noBtn.style.transform = "scale(0.8)";
                noBtn.style.opacity = "0.6";
            }
            if (noClickCount >= 6) {
                noBtn.innerText = "Okay Yes! 😂";
                noBtn.setAttribute("onclick", "celebrate()");
            }
        }

        function celebrate() {
            playMusic(); // Agar usne seedhe Yes dabaya, toh bhi music chalu
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('successSection').style.display = 'block';
            
            document.body.style.background = "linear-gradient(135deg, #ff9999, #ff3355)";
            
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heartsBg = document.getElementById('heartsBg');
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            
            const heartIcons = ['❤️', '💖', '✨', '💕', '🌸'];
            heart.innerText = heartIcons[Math.floor(Math.random() * heartIcons.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's'; 
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px'; 
            
            heartsBg.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createHeart, 400);
    </script>
</body>
</html>
